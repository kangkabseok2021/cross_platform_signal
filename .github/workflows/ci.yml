name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cpp-build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # SQLite is bundled via amalgamation in third_party/ — no system install needed.

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_DEFAULT_CMP0135=NEW

      - name: Build
        run: cmake --build build --config Release -j 4

      - name: Run GoogleTests
        run: ctest --test-dir build --build-config Release --output-on-failure -V

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install Python deps
        run: uv sync --frozen
      - name: Run pytest
        run: uv run pytest tools/test_tools.py -v
